services:
  - type: web
    name: BIOMECHASOFT
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && cd backend && npm ci --omit=dev
    startCommand: cd backend && npm start
    healthCheckPath: /nh/api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
